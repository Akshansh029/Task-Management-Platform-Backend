spring.application.name=TaskManagementPlatform

# Database (PostgreSQL on Render)
#spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/task-management-platform-db
spring.datasource.username=root
spring.datasource.password=mysql_akstlm10
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ENV variables
server.port=${PORT:8080}
jwt.secret-key=${SECRET_KEY}
jwt.issuer=${APP_URL:http://localhost:8080}

# Path prefix
spring.mvc.servlet.path=/api/v1

# API doc path
springdoc.api-docs.path=/api-docs

spring.profiles.active=dev
app.frontend.url=${FRONTEND_APP_URL:http://localhost:3000}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/v1/login/oauth2/code/{registrationId}

# Debugging
#logging.level.org.springframework.security=DEBUG